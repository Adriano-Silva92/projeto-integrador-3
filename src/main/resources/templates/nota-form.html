<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lançar Nota</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Lançar Nota</h2>

<form th:action="@{/notas/salvar}" th:object="${nota}" method="post">

    <div class="mb-3">
        <label>Aluno</label>
        <select th:field="*{aluno}" class="form-control" required>
            <option value="">Selecione</option>
            <option th:each="aluno : ${alunos}"
                    th:value="${aluno.id}"
                    th:text="${aluno.nome}">
            </option>
        </select>
    </div>

    <div class="mb-3">
        <label>Valor da Nota</label>
        <input type="number" step="0.1" th:field="*{valor}" class="form-control" required>
    </div>

    <button class="btn btn-success">Salvar</button>
    <a href="/admin" class="btn btn-secondary">Voltar</a>

</form>

</body>
</html>
