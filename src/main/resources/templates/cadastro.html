<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Usuário</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }

        .error {
            color: red;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Cadastrar Usuário</h2>

    <form method="post">

        <input type="text" name="nome" placeholder="Nome" required minlength="3">

        <input type="email" name="email" placeholder="Email" required>

        <input type="password" name="senha" placeholder="Senha" required minlength="6">

        <input type="password" name="confirmarSenha" placeholder="Confirmar Senha" required minlength="6">

        <button type="submit">Cadastrar</button>
    </form>

    <!-- MENSAGENS -->
    <div class="error">
        <!-- EXEMPLO COM THYMELAF -->
        <p th:if="${erro}">Senhas não conferem!</p>
    </div>

</div>

</body>
</html>
