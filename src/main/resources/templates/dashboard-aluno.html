<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Dashboard - Área do Aluno</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --primary-color: #4361ee;
            --sidebar-bg: #1a1a2e;
            --sidebar-text: rgba(255,255,255,0.8);
            --body-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: white;
            --card-text: #333;
            --table-header-bg: #1a1a2e;
            --border-color: #ddd;
            --shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        body.dark-theme {
            --primary-color: #6c5ce7;
            --sidebar-bg: #0f0f1a;
            --sidebar-text: rgba(255,255,255,0.9);
            --body-bg: linear-gradient(135deg, #2d2d3f 0%, #1a1a2e 100%);
            --card-bg: #1e1e2e;
            --card-text: #e0e0e0;
            --table-header-bg: #0f0f1a;
            --border-color: #2d2d3f;
            --shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        body {
            background: var(--body-bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: all 0.3s ease;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            width: 260px;
            background: var(--sidebar-bg);
            color: white;
            z-index: 1000;
            transition: all 0.3s ease;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }

        .sidebar.collapsed {
            margin-left: -260px;
        }

        .sidebar-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-menu {
            padding: 20px 0;
        }

        .sidebar-menu-item {
            padding: 12px 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--sidebar-text);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s;
        }

        .sidebar-menu-item:hover, .sidebar-menu-item.active {
            background: rgba(255,255,255,0.1);
            border-left: 3px solid var(--primary-color);
            color: white;
        }

        /* Main Content */
        .main-content {
            margin-left: 260px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .main-content.expanded {
            margin-left: 0;
        }

        /* Cards */
        .stat-card {
            background: var(--card-bg);
            color: var(--card-text);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .stat-card-icon {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 15px;
        }

        .chart-container, .table-container {
            background: var(--card-bg);
            color: var(--card-text);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }

        /* Badges */
        .badge-aprovado {
            background: #28a745;
            padding: 5px 12px;
            border-radius: 20px;
            color: white;
            font-weight: 600;
        }

        .badge-reprovado {
            background: #dc3545;
            padding: 5px 12px;
            border-radius: 20px;
            color: white;
            font-weight: 600;
        }

        .badge-rec {
            background: #ffc107;
            padding: 5px 12px;
            border-radius: 20px;
            color: #333;
            font-weight: 600;
        }

        /* Search Bar */
        .search-bar {
            position: relative;
            margin-bottom: 20px;
        }

        .search-bar input {
            width: 100%;
            padding: 10px 40px 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: var(--card-bg);
            color: var(--card-text);
        }

        .search-bar i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        /* User Info */
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--card-bg);
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: var(--shadow);
            color: var(--card-text);
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
            flex-wrap: wrap;
        }

        /* Toggle Button */
        .toggle-btn {
            background: var(--card-bg);
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--card-text);
            box-shadow: var(--shadow);
        }

        .toggle-btn:hover {
            transform: scale(1.05);
        }

        /* Theme Buttons */
        .theme-buttons {
            display: flex;
            gap: 10px;
        }

        .theme-btn {
            background: var(--card-bg);
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--card-text);
            box-shadow: var(--shadow);
        }

        .theme-btn:hover {
            transform: scale(1.05);
        }

        .theme-btn.active {
            background: var(--primary-color);
            color: white;
        }

        /* Accessibility Controls */
        .accessibility-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .font-control {
            background: var(--card-bg);
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--card-text);
            box-shadow: var(--shadow);
        }

        /* High Contrast */
        body.high-contrast {
            --body-bg: #000000;
            --card-bg: #ffffff;
            --card-text: #000000;
            --sidebar-bg: #000000;
            --border-color: #000000;
        }

        body.high-contrast .badge-aprovado {
            background: #00ff00;
            color: #000;
        }

        body.high-contrast .badge-reprovado {
            background: #ff0000;
            color: #fff;
        }

        /* Table */
        .table {
            color: var(--card-text);
        }

        .table thead th {
            background: var(--table-header-bg);
            color: white;
            border: none;
        }

        .table-striped tbody tr:nth-of-type(odd) {
            background-color: rgba(0,0,0,0.05);
        }

        body.dark-theme .table-striped tbody tr:nth-of-type(odd) {
            background-color: rgba(255,255,255,0.05);
        }

        /* Modal Grande */
        .modal-xl {
            max-width: 1200px;
        }

        /* Boletim Styles */
        .boletim-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--primary-color);
        }

        .boletim-info {
            background: linear-gradient(135deg, var(--primary-color), #764ba2);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .grade-table th {
            background: var(--primary-color);
            color: white;
            text-align: center;
        }

        .grade-table td {
            text-align: center;
            vertical-align: middle;
        }

        .media-geral-card {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .chart-boletim {
            height: 300px;
            margin-top: 20px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-content {
                margin-left: 0;
            }
            .top-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .accessibility-controls {
                justify-content: space-between;
            }
        }

        /* Animations */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .animate-slide {
            animation: slideIn 0.5s ease-out;
        }

        /* Barra de progresso */
        .progress {
            height: 25px;
            border-radius: 10px;
        }

        .progress-bar {
            transition: width 0.5s ease;
        }
    </style>
</head>

<body>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h3><i class="fas fa-graduation-cap"></i> GestãoEscolar</h3>
        <small>Área do Aluno</small>
    </div>
    <div class="sidebar-menu">
        <a class="sidebar-menu-item active" onclick="showDashboard()">
            <i class="fas fa-chart-line"></i> Dashboard
        </a>
        <a class="sidebar-menu-item" onclick="showPerfil()">
            <i class="fas fa-user"></i> Perfil
        </a>
        <a class="sidebar-menu-item" href="/logout">
            <i class="fas fa-sign-out-alt"></i> Sair
        </a>
    </div>
</div>

<div class="main-content" id="mainContent">
    <!-- TOP BAR -->
    <div class="top-bar">
        <button class="toggle-btn" onclick="toggleSidebar()" title="Ocultar/Mostrar Menu">
            <i class="fas fa-bars"></i> Menu
        </button>

        <div class="accessibility-controls">
            <div class="theme-buttons">
                <button class="theme-btn active" onclick="setTheme('light', event)" title="Tema Claro">
                    <i class="fas fa-sun"></i>
                </button>
                <button class="theme-btn" onclick="setTheme('dark', event)" title="Tema Escuro">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="theme-btn" onclick="setTheme('high-contrast', event)" title="Alto Contraste">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
            
            <div class="font-controls">
                <button class="font-control" onclick="changeFontSize(-1)" title="Diminuir Fonte">
                    <i class="fas fa-font"></i> A-
                </button>
                <button class="font-control" onclick="changeFontSize(0)" title="Fonte Normal">
                    <i class="fas fa-font"></i> A
                </button>
                <button class="font-control" onclick="changeFontSize(1)" title="Aumentar Fonte">
                    <i class="fas fa-font"></i> A+
                </button>
            </div>
        </div>

        <div th:replace="~{fragments/user-info :: userInfo}"></div>
    </div>

    <div id="dashboardContent">
        <!-- STATS CARDS -->
        <div class="row" id="statsCards">
            <div class="col-md-4">
                <div class="stat-card animate-slide">
                    <div class="stat-card-icon" style="background: #667eea; color: white;">
                        <i class="fas fa-chart-line"></i>
                    </div>
                    <h6>Média Geral</h6>
                    <h3 id="mediaGeral">0.00</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card animate-slide" style="animation-delay: 0.1s">
                    <div class="stat-card-icon" style="background: #28a745; color: white;">
                        <i class="fas fa-book"></i>
                    </div>
                    <h6>Total de Disciplinas</h6>
                    <h3 id="totalDisciplinas">0</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card animate-slide" style="animation-delay: 0.2s">
                    <div class="stat-card-icon" style="background: #17a2b8; color: white;">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <h6>Disciplinas Aprovado</h6>
                    <h3 id="aprovadas">0</h3>
                </div>
            </div>
        </div>

        <!-- GRÁFICO POR DISCIPLINA -->
        <div class="row">
            <div class="col-md-12">
                <div class="chart-container animate-slide" style="animation-delay: 0.3s">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5><i class="fas fa-chart-bar"></i> Desempenho por Disciplina e Bimestre</h5>
                        <button class="btn btn-primary" onclick="verBoletim()">
                            <i class="fas fa-file-alt"></i> Ver Boletim Completo
                        </button>
                    </div>
                    <canvas id="disciplinasChart" height="174"></canvas>
                </div>
            </div>
        </div>

        <!-- TABELA DE NOTAS LANÇADASs -->
        <div class="table-container animate-slide" style="animation-delay: 0.4s">
            <h5><i class="fas fa-table"></i> Todas as Notas Lançadas</h5>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Pesquisar por disciplina..." onkeyup="filterTable()">
                <i class="fas fa-search"></i>
            </div>
            <div class="table-responsive">
                <table class="table table-striped table-hover" id="notasTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Disciplina</th>
                            <th>Nota</th>
                            <th>Status</th>
                            <th>Data Lançamento</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="5" class="text-center">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- MODAL BOLETIM COMPLETO -->
<div class="modal fade" id="boletimModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header" style="background: linear-gradient(135deg, #4361ee, #764ba2); color: white;">
                <h5 class="modal-title"><i class="fas fa-graduation-cap"></i> Boletim Escolar Completo</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="boletimModalBody">
             
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                <button type="button" class="btn btn-success" onclick="gerarPDF()">
                    <i class="fas fa-file-pdf"></i> Gerar PDF
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let notasData = [];
    let disciplinasChart;
    let currentFontSize = 100;
    let boletimModal;

    // Dados do aluno logado (simulando - no backend virá do usuário autenticado)
    let alunoLogado = {
        id: 1,
        ra: 'RA123456',
        nome: 'João Silva',
        email: 'joao.silva@escola.com'
    };

    // Disciplinas configuradas
    const disciplinas = ['Matemática', 'Português', 'Ciências', 'História', 'Geografia', 'Inglês'];

    // Carregar dados via AJAX
    async function loadData() {
        try {
            // Buscar notas do aluno logado
            const response = await fetch(`/dashboard/aluno/${alunoLogado.id}/notas`);
            const data = await response.json();
            
            notasData = data.notas || [];
            
            // Calcular e atualizar cards
            updateStatsCards();
            
            // Atualizar tabela
            updateTable();
            
            // Inicializar gráficos
            initDisciplinasChart();
            
        } catch (error) {
            console.error('Erro ao carregar dados:', error);
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" class="text-center text-danger">Erro ao carregar dados</td></tr>';
            // Dados de exemplo para demonstração
            loadExampleData();
        }
    }

    // Dados de exemplo só para demonstração
    function loadExampleData() {
        notasData = [
            { id: 1, disciplina: 'Matemática', bimestre: 1, valor: 8.5, dataLancamento: '2024-03-15' },
            { id: 2, disciplina: 'Matemática', bimestre: 2, valor: 7.0, dataLancamento: '2024-06-10' },
            { id: 3, disciplina: 'Matemática', bimestre: 3, valor: 6.5, dataLancamento: '2024-09-20' },
            { id: 4, disciplina: 'Matemática', bimestre: 4, valor: 8.0, dataLancamento: '2024-11-25' },
            { id: 5, disciplina: 'Português', bimestre: 1, valor: 7.5, dataLancamento: '2024-03-15' },
            { id: 6, disciplina: 'Português', bimestre: 2, valor: 6.0, dataLancamento: '2024-06-10' },
            { id: 7, disciplina: 'Português', bimestre: 3, valor: 7.0, dataLancamento: '2024-09-20' },
            { id: 8, disciplina: 'Português', bimestre: 4, valor: 7.5, dataLancamento: '2024-11-25' },
            { id: 9, disciplina: 'Ciências', bimestre: 1, valor: 9.0, dataLancamento: '2024-03-15' },
            { id: 10, disciplina: 'Ciências', bimestre: 2, valor: 8.5, dataLancamento: '2024-06-10' },
            { id: 11, disciplina: 'Ciências', bimestre: 3, valor: 9.0, dataLancamento: '2024-09-20' },
            { id: 12, disciplina: 'Ciências', bimestre: 4, valor: 9.5, dataLancamento: '2024-11-25' },
            { id: 13, disciplina: 'História', bimestre: 1, valor: 6.0, dataLancamento: '2024-03-15' },
            { id: 14, disciplina: 'História', bimestre: 2, valor: 5.5, dataLancamento: '2024-06-10' },
            { id: 15, disciplina: 'História', bimestre: 3, valor: 6.0, dataLancamento: '2024-09-20' },
            { id: 16, disciplina: 'História', bimestre: 4, valor: 5.0, dataLancamento: '2024-11-25' },
            { id: 17, disciplina: 'Geografia', bimestre: 1, valor: 7.0, dataLancamento: '2024-03-15' },
            { id: 18, disciplina: 'Geografia', bimestre: 2, valor: 6.5, dataLancamento: '2024-06-10' },
            { id: 19, disciplina: 'Geografia', bimestre: 3, valor: 7.0, dataLancamento: '2024-09-20' },
            { id: 20, disciplina: 'Geografia', bimestre: 4, valor: 6.5, dataLancamento: '2024-11-25' },
            { id: 21, disciplina: 'Inglês', bimestre: 1, valor: 8.0, dataLancamento: '2024-03-15' },
            { id: 22, disciplina: 'Inglês', bimestre: 2, valor: 7.5, dataLancamento: '2024-06-10' },
            { id: 23, disciplina: 'Inglês', bimestre: 3, valor: 8.0, dataLancamento: '2024-09-20' },
            { id: 24, disciplina: 'Inglês', bimestre: 4, valor: 8.5, dataLancamento: '2024-11-25' }
        ];
        
        updateStatsCards();
        updateTable();
        initDisciplinasChart();
    }

    // Atualizar cards de estatísticas
    function updateStatsCards() {
        // Calcular média geral (média das médias por disciplina)
        let mediasPorDisciplina = {};
        disciplinas.forEach(disciplina => {
            let notasDisciplina = notasData.filter(n => n.disciplina === disciplina);
            if (notasDisciplina.length > 0) {
                let soma = notasDisciplina.reduce((acc, n) => acc + n.valor, 0);
                mediasPorDisciplina[disciplina] = soma / notasDisciplina.length;
            }
        });
        
        let valores = Object.values(mediasPorDisciplina);
        let mediaGeral = valores.length > 0 ? valores.reduce((a, b) => a + b, 0) / valores.length : 0;
        
        // Contar disciplinas aprovadas (média >= 6)
        let aprovadas = Object.values(mediasPorDisciplina).filter(m => m >= 6).length;
        
        document.getElementById('mediaGeral').innerText = mediaGeral.toFixed(2);
        document.getElementById('totalDisciplinas').innerText = disciplinas.length;
        document.getElementById('aprovadas').innerText = aprovadas;
    }

    // Atualizar tabela de notas
    function updateTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        
        if (notasData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center">Nenhuma nota lançada</td></tr>';
            return;
        }
        
        notasData.sort((a, b) => a.disciplina.localeCompare(b.disciplina));
        
        notasData.forEach((nota, index) => {
            const row = tbody.insertRow();
            let status = '';
            let statusClass = '';
            
            if (nota.valor < 5) {
                status = 'Reprovado';
                statusClass = 'badge-reprovado';
            } else if (nota.valor === 5) {
                status = 'Recuperação';
                statusClass = 'badge-rec';
            } else {
                status = 'Aprovado';
                statusClass = 'badge-aprovado';
            }
            
            row.insertCell(0).innerText = index + 1;
            row.insertCell(1).innerText = nota.disciplina;
            row.insertCell(2).innerHTML = `<span class="badge ${statusClass}">${nota.valor.toFixed(1)}</span>`;
            row.insertCell(3).innerHTML = `<span class="badge ${statusClass}">${status}</span>`;
            row.insertCell(4).innerText = nota.dataLancamento || '2024-03-15';
        });
    }

    // Gráfico de desempenho por disciplina (barras empilhadas por bimestre)
    function initDisciplinasChart() {
        const bimestres = [1, 2, 3, 4];
        const datasets = [];
        const colors = ['#4361ee', '#3b82f6', '#2563eb', '#1d4ed8'];
        
        bimestres.forEach((bimestre, idx) => {
            const dados = disciplinas.map(disciplina => {
                const nota = notasData.find(n => n.disciplina === disciplina && n.bimestre === bimestre);
                return nota ? nota.valor : 0;
            });
            
            datasets.push({
                label: `${bimestre}º Bimestre`,
                data: dados,
                backgroundColor: colors[idx],
                borderRadius: 5
            });
        });
        
        const ctx = document.getElementById('disciplinasChart').getContext('2d');
        if (disciplinasChart) disciplinasChart.destroy();
        
        disciplinasChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: disciplinas,
                datasets: datasets
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                scales: {
                    x: { stacked: false },
                    y: { 
                        beginAtZero: true, 
                        max: 10,
                        title: { display: true, text: 'Notas' }
                    }
                },
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: (ctx) => `${ctx.dataset.label}: ${ctx.raw.toFixed(1)}`
                        }
                    },
                    legend: { position: 'top' }
                }
            }
        });
    }

    // Calcular média por disciplina
    function calcularMediaDisciplina(disciplina) {
        const notasDisciplina = notasData.filter(n => n.disciplina === disciplina);
        if (notasDisciplina.length === 0) return 0;
        const soma = notasDisciplina.reduce((acc, n) => acc + n.valor, 0);
        return soma / notasDisciplina.length;
    }

    // Determinar situação baseado na média
    function getSituacao(media) {
        if (media >= 6) return { text: 'Aprovado', class: 'badge-aprovado' };
        if (media >= 5) return { text: 'Recuperação', class: 'badge-rec' };
        return { text: 'Reprovado', class: 'badge-reprovado' };
    }

    // Calcular faltas (simulado - ajustar conforme necessidade)
    function getFaltas(disciplina) {
        // Simulação de faltas - no backend virá do banco
        const faltasPorDisciplina = {
            'Matemática': 8,
            'Português': 5,
            'Ciências': 3,
            'História': 10,
            'Geografia': 6,
            'Inglês': 4
        };
        return faltasPorDisciplina[disciplina] || 0;
    }

    // Ver boletim completo
    function verBoletim() {
        // Calcular médias por disciplina
        const mediasDisciplinas = [];
        let somaTotalNotas = 0;
        let totalNotas = 0;
        
        disciplinas.forEach(disciplina => {
            const notas = notasData.filter(n => n.disciplina === disciplina);
            const notasValores = notas.map(n => n.valor);
            const media = notasValores.length > 0 ? notasValores.reduce((a, b) => a + b, 0) / notasValores.length : 0;
            const situacao = getSituacao(media);
            const faltas = getFaltas(disciplina);
            
            mediasDisciplinas.push({
                disciplina,
                notas: notasValores,
                media: media,
                situacao: situacao,
                faltas: faltas
            });
            
            somaTotalNotas += notasValores.reduce((a, b) => a + b, 0);
            totalNotas += notasValores.length;
        });
        
        const mediaGeral = totalNotas > 0 ? somaTotalNotas / totalNotas : 0;
        
        // Gerar HTML do boletim
        const boletimHTML = `
            <div id="boletimContent">
                <div class="boletim-header">
                    <h2>Boletim Escolar</h2>
                    <p>${new Date().getFullYear()} - Sistema de Gestão Escolar</p>
                </div>
                
                <div class="row">
                    <div class="col-md-6">
                        <div class="boletim-info">
                            <h5><i class="fas fa-user-graduate"></i> Dados do Aluno</h5>
                            <p><strong>RA:</strong> ${alunoLogado.ra}</p>
                            <p><strong>Nome:</strong> ${alunoLogado.nome}</p>
                            <p><strong>Email:</strong> ${alunoLogado.email}</p>
                            <p><strong>Curso:</strong> Ensino Médio</p>
                            <p><strong>Ano Letivo:</strong> ${new Date().getFullYear()}</p>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="media-geral-card">
                            <h5><i class="fas fa-chart-line"></i> Aproveitamento Geral</h5>
                            <h2 class="display-4">${mediaGeral.toFixed(1)}</h2>
                            <p>Média Geral de Aproveitamento</p>
                            <div class="progress">
                                <div class="progress-bar ${mediaGeral >= 6 ? 'bg-success' : mediaGeral >= 5 ? 'bg-warning' : 'bg-danger'}" 
                                     style="width: ${(mediaGeral / 10) * 100}%">
                                    ${((mediaGeral / 10) * 100).toFixed(0)}%
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="table-responsive mt-4">
                    <table class="table table-bordered grade-table">
                        <thead>
                            <tr>
                                <th>Disciplina</th>
                                ${Array.from({length: 4}, (_, i) => `<th>${i+1}º Bim</th>`).join('')}
                                <th>Média</th>
                                <th>Faltas</th>
                                <th>Situação</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${mediasDisciplinas.map(d => `
                                <tr>
                                    <td><strong>${d.disciplina}</strong></td>
                                    ${d.notas.map((nota, idx) => `
                                        <td class="${nota < 5 ? 'text-danger' : nota === 5 ? 'text-warning' : 'text-success'}">
                                            ${nota.toFixed(1)}
                                        </td>
                                    `).join('')}
                                    ${d.notas.length < 4 ? Array(4 - d.notas.length).fill('<td>-</td>').join('') : ''}
                                    <td><strong>${d.media.toFixed(1)}</strong></td>
                                    <td>${d.faltas}</td>
                                    <td><span class="badge ${d.situacao.class}">${d.situacao.text}</span></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
                
                <div class="row mt-4">
                    <div class="col-md-6">
                        <canvas id="boletimChart" class="chart-boletim"></canvas>
                    </div>
                    <div class="col-md-6">
                        <div id="boletimPieChart" class="chart-boletim"></div>
                    </div>
                </div>
                
                <div class="mt-4 text-muted text-center">
                    <small>Sistema de Gestão Escolar - Boletim Gerado em ${new Date().toLocaleDateString('pt-BR')}</small>
                </div>
            </div>
        `;
        
        document.getElementById('boletimModalBody').innerHTML = boletimHTML;
        
        // Inicializar gráficos do boletim
        setTimeout(() => {
            initBoletimCharts(mediasDisciplinas);
        }, 100);
        
        boletimModal = new bootstrap.Modal(document.getElementById('boletimModal'));
        boletimModal.show();
    }

    // Inicializar gráficos do boletim
    function initBoletimCharts(mediasDisciplinas) {
        // Gráfico de barras das médias
        const ctx = document.getElementById('boletimChart');
        if (ctx) {
            const labels = mediasDisciplinas.map(d => d.disciplina);
            const medias = mediasDisciplinas.map(d => d.media);
            const cores = medias.map(m => m >= 6 ? '#28a745' : m >= 5 ? '#ffc107' : '#dc3545');
            
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Média Final',
                        data: medias,
                        backgroundColor: cores,
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    scales: { y: { beginAtZero: true, max: 10 } },
                    plugins: { legend: { position: 'top' } }
                }
            });
        }
        
        // Gráfico de pizza - situação
        const aprovados = mediasDisciplinas.filter(d => d.media >= 6).length;
        const recuperacao = mediasDisciplinas.filter(d => d.media >= 5 && d.media < 6).length;
        const reprovados = mediasDisciplinas.filter(d => d.media < 5).length;
        
        const pieOptions = {
            series: [aprovados, recuperacao, reprovados],
            chart: { type: 'donut', height: 250 },
            labels: ['Aprovados', 'Recuperação', 'Reprovados'],
            colors: ['#28a745', '#ffc107', '#dc3545'],
            legend: { position: 'bottom' }
        };
        
        const pieChart = new ApexCharts(document.querySelector("#boletimPieChart"), pieOptions);
        pieChart.render();
    }

    // Gerar PDF do boletim
    function gerarPDF() {
        const element = document.getElementById('boletimContent');
        const opt = {
            margin: [10, 10, 10, 10],
            filename: `Boletim_${alunoLogado.nome}_${new Date().getFullYear()}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, letterRendering: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }

    // Filtro para tabela
    function filterTable() {
        const filter = document.getElementById('searchInput').value.toUpperCase();
        const rows = document.getElementById('tableBody').getElementsByTagName('tr');

        for (let i = 0; i < rows.length; i++) {
            const textoLinha = rows[i].innerText.toUpperCase();
            if (textoLinha.includes(filter)) {
                rows[i].style.display = '';
            } else {
                rows[i].style.display = 'none';
            }
        }
    }

    // Sidebar Toggle
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        
        sidebar.classList.toggle('collapsed');
        mainContent.classList.toggle('expanded');
        
        localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
    }

    // Temas
    function setTheme(theme, e) {
        const body = document.body;
        body.classList.remove('dark-theme', 'high-contrast');
        
        if (theme === 'dark') {
            body.classList.add('dark-theme');
        } else if (theme === 'high-contrast') {
            body.classList.add('high-contrast');
        }
        
        document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
        if (e && e.target) {
            e.target.closest('.theme-btn').classList.add('active');
        }
        
        localStorage.setItem('theme', theme);
        
        if (notasData.length > 0) {
            setTimeout(() => initDisciplinasChart(), 100);
        }
    }

    // Controle de fonte
    function changeFontSize(direction) {
        const body = document.body;
        
        if (direction === -1) {
            currentFontSize = Math.max(80, currentFontSize - 10);
        } else if (direction === 1) {
            currentFontSize = Math.min(130, currentFontSize + 10);
        } else {
            currentFontSize = 100;
        }
        
        body.style.fontSize = currentFontSize + '%';
        localStorage.setItem('fontSize', currentFontSize);
    }

    // Perfil
    function showPerfil() {
        alert('Perfil do aluno - Funcionalidade em desenvolvimento');
    }

    // Dashboard
    function showDashboard() {
        document.getElementById('dashboardContent').style.display = 'block';
        loadData();
    }

    // Carregar preferências
    function loadPreferences() {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme && savedTheme !== 'light') {
            setTheme(savedTheme);
        }
        
        const savedFontSize = localStorage.getItem('fontSize');
        if (savedFontSize) {
            currentFontSize = parseInt(savedFontSize);
            document.body.style.fontSize = currentFontSize + '%';
        }
        
        const sidebarCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
        if (sidebarCollapsed) {
            document.getElementById('sidebar').classList.add('collapsed');
            document.getElementById('mainContent').classList.add('expanded');
        }
    }

    // Inicializar
    loadPreferences();
    loadData();
</script>
</body>
</html>
