<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nova Turma - Sistema Acadêmico</title>
    <link rel="stylesheet" 
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" 
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
     
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container-custom {
            max-width: 700px;
            margin: 0 auto;
        }
        
        .form-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .card-header-custom {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            text-align: center;
            position: relative;
        }
        
        .card-header-custom h2 {
            color: white;
            font-weight: 700;
            margin: 0;
            font-size: 28px;
        }
        
        .card-header-custom p {
            color: rgba(255,255,255,0.9);
            margin: 10px 0 0 0;
            font-size: 14px;
        }
        
        .icon-circle {
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        
        .icon-circle i {
            font-size: 35px;
            color: white;
        }
        
        .card-body-custom {
            padding: 40px;
        }
        
        .form-group-custom {
            margin-bottom: 30px;
            position: relative;
        }
        
        .form-label-custom {
            font-weight: 600;
            color: #495057;
            margin-bottom: 10px;
            display: block;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .form-label-custom i {
            margin-right: 8px;
            color: #667eea;
        }
        
        .input-custom {
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 12px 15px;
            font-size: 16px;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .input-custom:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
            outline: none;
        }
        
        .input-custom.error {
            border-color: #dc3545;
            background-color: #fff8f8;
        }
        
        .error-message {
            color: #dc3545;
            font-size: 12px;
            margin-top: 5px;
            display: block;
        }
        
        .help-text {
            color: #6c757d;
            font-size: 12px;
            margin-top: 5px;
            display: block;
        }
        
        .help-text i {
            font-size: 10px;
        }
        
        .btn-group-custom {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        
        .btn-save {
            flex: 1;
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            font-size: 16px;
            color: white;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .btn-save:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }
        
        .btn-save:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .btn-back {
            flex: 1;
            background: #6c757d;
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            font-size: 16px;
            color: white;
            transition: all 0.3s ease;
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-back:hover {
            background: #5a6268;
            transform: translateY(-2px);
            text-decoration: none;
            color: white;
        }
        
        .character-counter {
            text-align: right;
            font-size: 11px;
            color: #6c757d;
            margin-top: 5px;
        }
        
        .character-counter span {
            font-weight: 600;
        }
        
        .character-counter.warning span {
            color: #f59e0b;
        }
        
        .character-counter.danger span {
            color: #dc3545;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .shake {
            animation: shake 0.3s ease-in-out;
        }
        
        @media (max-width: 768px) {
            .card-body-custom {
                padding: 25px;
            }
            
            .btn-group-custom {
                flex-direction: column;
            }
            
            .card-header-custom h2 {
                font-size: 24px;
            }
        }
        
        /* Loading spinner */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Breadcrumb */
        .breadcrumb-custom {
            margin-bottom: 20px;
            background: transparent;
            padding: 0;
        }
        
        .breadcrumb-custom a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        
        .breadcrumb-custom a:hover {
            opacity: 0.8;
        }
        
        .breadcrumb-custom .separator {
            color: white;
            margin: 0 10px;
        }
        
        .breadcrumb-custom .current {
            color: rgba(255,255,255,0.8);
        }
    </style>
    
    <!-- SWEETALERT2 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
</head>

<body>
    <div class="container-custom">
        
        <!-- BREADCRUMP DE NAVEGAÇÃO -->
        <div class="breadcrumb-custom">
            <a href="/turmas">
                <i class="fas fa-chalkboard"></i> Minhas Turmas
            </a>
            <span class="separator">/</span>
            <span class="current">Nova Turma</span>
        </div>
        
        <!-- FORM NOVA TURMA -->
        <div class="form-card">
            <div class="card-header-custom">
                <div class="icon-circle">
                    <i class="fas fa-plus-circle"></i>
                </div>
                <h2>Criar Nova Turma</h2>
                <p>Preencha as informações abaixo para criar uma nova turma</p>
            </div>
            
            <div class="card-body-custom">
                <form th:action="@{/turmas/salvar}" 
                      th:object="${turma}" 
                      method="post" 
                      id="turmaForm"
                      novalidate>
                    
                    <!-- CAMPO NOME DA TURMA -->
                    <div class="form-group-custom">
                        <label class="form-label-custom">
                            <i class="fas fa-tag"></i>
                            Nome da Turma
                        </label>
                        <input type="text"
                               th:field="*{nome}"
                               class="input-custom"
                               id="nomeTurma"
                               placeholder="Ex: 1º Ano A, Turma de Matemática, etc."
                               required
                               maxlength="100">
                        <div class="character-counter" id="charCounter">
                            <i class="fas fa-keyboard"></i> 
                            <span id="charCount">0</span>/100 caracteres
                        </div>
                        <div class="help-text">
                            <i class="fas fa-info-circle"></i> Escolha um nome descritivo para identificar facilmente sua turma
                        </div>
                        <div class="error-message" id="nomeError" style="display: none;">
                            <i class="fas fa-exclamation-circle"></i> Por favor, informe o nome da turma
                        </div>
                    </div>
                    
                    <!-- BOTÕES DE AÇÃO -->
                    <div class="btn-group-custom">
                        <button type="submit" class="btn-save" id="btnSalvar">
                            <i class="fas fa-save"></i> Salvar Turma
                        </button>
                        <a href="/turmas" class="btn-back">
                            <i class="fas fa-arrow-left"></i> Voltar
                        </a>
                    </div>
                    
                </form>
            </div>
        </div>
    </div>
    
    <!-- SCRIPTS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script th:inline="javascript">
        /*<![CDATA[*/
        
        $(document).ready(function() {
            
            const nomeInput = $('#nomeTurma');
            const charCount = $('#charCount');
            const charCounterDiv = $('.character-counter');
            const form = $('#turmaForm');
            const btnSalvar = $('#btnSalvar');
            const nomeError = $('#nomeError');
            
            // Atualizar contador de caracteres
            function updateCharCounter() {
                const length = nomeInput.val().length;
                charCount.text(length);
                
                // Mudar cor baseada no comprimento
                charCounterDiv.removeClass('warning danger');
                if (length > 80) {
                    charCounterDiv.addClass('warning');
                }
                if (length > 95) {
                    charCounterDiv.addClass('danger');
                }
            }
            
            // Validar campo em tempo real
            function validateNome() {
                const value = nomeInput.val().trim();
                
                if (!value) {
                    nomeInput.addClass('error');
                    nomeError.fadeIn();
                    return false;
                } else if (value.length < 3) {
                    nomeInput.addClass('error');
                    nomeError.html('<i class="fas fa-exclamation-circle"></i> O nome da turma deve ter pelo menos 3 caracteres').show();
                    return false;
                } else {
                    nomeInput.removeClass('error');
                    nomeError.fadeOut();
                    return true;
                }
            }
            
            // Eventos de validação
            nomeInput.on('input', function() {
                updateCharCounter();
                validateNome();
            });
            
            nomeInput.on('blur', function() {
                validateNome();
            });
            
            // Inicializar contador
            updateCharCounter();
            
            // Submissão do formulário com SweetAlert e validação
            form.on('submit', function(e) {
                e.preventDefault();
                
                // Validar antes de enviar
                const isValid = validateNome();
                
                if (!isValid) {
                    // Animar o campo com erro
                    nomeInput.addClass('shake');
                    setTimeout(() => {
                        nomeInput.removeClass('shake');
                    }, 300);
                    
                    Swal.fire({
                        title: '<span style="font-size: 22px;">❓ Campos Inválidos</span>',
                        html: `
                            <div class="text-center">
                                <i class="fas fa-exclamation-triangle" style="font-size: 60px; color: #f59e0b; margin-bottom: 15px;"></i>
                                <p style="font-size: 16px;">Por favor, preencha o nome da turma corretamente.</p>
                                <p class="text-muted small">O nome deve ter pelo menos 3 caracteres.</p>
                            </div>
                        `,
                        icon: 'warning',
                        confirmButtonColor: '#f59e0b',
                        confirmButtonText: '<i class="fas fa-check mr-2"></i>Entendi',
                        timer: 3000
                    });
                    return false;
                }
                
                // Confirmar criação da turma
                const turmaNome = nomeInput.val().trim();
                
                Swal.fire({
                    title: '<span style="font-size: 22px;">✨ Criar Nova Turma</span>',
                    html: `
                        <div class="text-center">
                            <i class="fas fa-chalkboard" style="font-size: 60px; color: #667eea; margin-bottom: 15px;"></i>
                            <p style="font-size: 16px;">Você está prestes a criar a turma:</p>
                            <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px; border-radius: 10px; margin: 15px 0;">
                                <strong style="font-size: 18px;">"${escapeHtml(turmaNome)}"</strong>
                            </div>
                            <p class="text-muted small">Confirme os dados antes de prosseguir.</p>
                        </div>
                    `,
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonColor: '#28a745',
                    cancelButtonColor: '#6c757d',
                    confirmButtonText: '<i class="fas fa-check mr-2"></i>Sim, criar turma',
                    cancelButtonText: '<i class="fas fa-times mr-2"></i>Cancelar',
                    reverseButtons: true,
                    customClass: {
                        popup: 'rounded-lg',
                        confirmButton: 'btn btn-success btn-lg px-4',
                        cancelButton: 'btn btn-secondary btn-lg px-4'
                    }
                }).then((result) => {
                    if (result.isConfirmed) {
                        // Desabilitar botão e mostrar loading
                        btnSalvar.prop('disabled', true);
                        const originalText = btnSalvar.html();
                        btnSalvar.html('<span class="loading-spinner"></span> Salvando...');
                        
                        // Mostrar loading
                        Swal.fire({
                            title: '<span style="font-size: 20px;">⏳ Criando turma...</span>',
                            html: '<div class="spinner-border text-success" role="status"></div><p class="mt-3">Aguarde enquanto processamos sua solicitação</p>',
                            showConfirmButton: false,
                            allowOutsideClick: false,
                            didOpen: () => {
                                Swal.showLoading();
                            }
                        });
                        
                        // Enviar formulário via AJAX
                        const formData = new FormData(form[0]);
                        
                        fetch(window.location.origin + '/turmas/salvar', {
                            method: 'POST',
                            body: formData,
                            credentials: 'include',
                            headers: {
                                'X-Requested-With': 'XMLHttpRequest'
                            }
                        })
                        .then(response => {
                            if (response.ok) {
                                return response.json().catch(() => ({ success: true }));
                            } else if (response.status === 409) {
                                return response.json().then(data => {
                                    throw new Error(data.message || 'Já existe uma turma com este nome');
                                });
                            }
                            throw new Error('Erro ao criar turma');
                        })
                        .then(data => {
                            // Sucesso
                            Swal.fire({
                                title: '<span style="font-size: 22px;">🎉 Turma Criada com Sucesso!</span>',
                                html: `
                                    <div class="text-center">
                                        <i class="fas fa-check-circle" style="font-size: 70px; color: #28a745; margin-bottom: 20px;"></i>
                                        <p style="font-size: 16px;">A turma <strong>"${escapeHtml(turmaNome)}"</strong> foi criada com sucesso!</p>
                                        <div class="mt-3">
                                            <i class="fas fa-arrow-right"></i> Você será redirecionado para a lista de turmas
                                        </div>
                                    </div>
                                `,
                                icon: 'success',
                                confirmButtonColor: '#28a745',
                                confirmButtonText: '<i class="fas fa-check mr-2"></i>Continuar',
                                timer: 3000,
                                timerProgressBar: true,
                                didClose: () => {
                                    window.location.href = '/turmas';
                                }
                            });
                        })
                        .catch(error => {
                            console.error('Erro:', error);
                            
                            // Restaurar botão
                            btnSalvar.prop('disabled', false);
                            btnSalvar.html(originalText);
                            
                            // Mostrar erro
                            Swal.fire({
                                title: '<span style="font-size: 22px;">❌ Erro ao Criar Turma</span>',
                                html: `
                                    <div class="text-center">
                                        <i class="fas fa-exclamation-circle" style="font-size: 60px; color: #dc3545; margin-bottom: 15px;"></i>
                                        <p>Não foi possível criar a turma.</p>
                                        <p class="text-muted small">${escapeHtml(error.message)}</p>
                                        <div class="alert alert-danger mt-3" style="border-radius: 10px;">
                                            <i class="fas fa-info-circle"></i> Verifique se o nome da turma já não existe e tente novamente.
                                        </div>
                                    </div>
                                `,
                                icon: 'error',
                                confirmButtonColor: '#dc3545',
                                confirmButtonText: '<i class="fas fa-redo mr-2"></i>Tentar Novamente'
                            });
                        });
                    }
                });
                
                return false;
            });
            
            // Função auxiliar para escapar HTML
            function escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            
            // Prevenir submissão com Enter sem validação
            nomeInput.on('keypress', function(e) {
                if (e.which === 13) {
                    e.preventDefault();
                    form.submit();
                }
            });
            
            // Auto-foco no campo
            nomeInput.focus();
            
            // Dicas de nomes sugeridos (opcional)
            const suggestedNames = [
                '1º Ano A - Manhã',
                '2º Ano B - Tarde',
                '3º Ano C - Noite',
                'Turma de Programação',
                'Matemática Avançada'
            ];
            
            // Mostrar sugestões quando o campo estiver vazio e em foco (melhoria UX)
            let showSuggestions = false;
            nomeInput.on('focus', function() {
                if ($(this).val().trim() === '' && !showSuggestions) {
                    showSuggestions = true;
                    // Opcional: Implementar um dropdown de sugestões
                }
            });
            
        });
        
        /*]]>*/
    </script>
    
    
</body>
</html>
