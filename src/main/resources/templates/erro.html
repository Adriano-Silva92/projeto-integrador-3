<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Erro no Sistema</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #ff4e50, #f9d423);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }

        .error-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 500px;
        }

        .error-icon {
            font-size: 60px;
            color: #dc3545;
        }

        .btn-custom {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="error-box">
    <div class="error-icon">⚠️</div>

    <h2 class="mt-3">Ocorreu um erro</h2>

    <p class="text-muted">
        Algo deu errado no sistema.<br>
        Tente novamente ou volte para o início.
    </p>

    <div>
        <a href="/login" class="btn btn-primary btn-custom">
            Ir para Login
        </a>

        <a href="javascript:history.back()" class="btn btn-secondary btn-custom">
            Voltar
        </a>
    </div>
</div>

</body>
</html>
