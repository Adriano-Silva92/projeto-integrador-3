<div th:fragment="userInfo">
    <div class="user-info d-flex align-items-center">

        <div class="position-relative">
            <img 
                th:src="${session.usuarioLogado != null 
                    && session.usuarioLogado.foto != null 
                    && session.usuarioLogado.foto != '' 
                    ? session.usuarioLogado.foto 
                    : '/img/user_padrao.png'}"
                class="rounded-circle border"
                width="40"
                height="40"
                style="object-fit: cover;">

            <span class="position-absolute bottom-0 end-0 translate-middle p-1 bg-success border border-light rounded-circle"></span>
        </div>

        <div class="d-flex flex-column justify-content-center ms-2">
            <strong th:text="${session.usuarioLogado.nome}" style="font-size: 0.9rem;"></strong>
            <span 
                th:class="${'badge-role ' + session.usuarioLogado.role}"
                th:text="${session.usuarioLogado.role}">
            </span>
        </div>

    </div>
</div>
