<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Alunos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Alunos</h2>

<a href="/alunos/novo" class="btn btn-success mb-3">Novo Aluno</a>
<a href="/admin" class="btn btn-secondary mb-3">Voltar</a>

<table class="table table-bordered">
    <tr>
        <th>Nome</th>
        <th>Email</th>
        <th>Ações</th>
    </tr>

    <tr th:each="aluno : ${alunos}">
        <td th:text="${aluno.nome}"></td>
        <td th:text="${aluno.email}"></td>

        <td>
            <a th:href="@{/alunos/editar/{id}(id=${aluno.id})}" class="btn btn-warning btn-sm">Editar</a>
            <a th:href="@{/alunos/excluir/{id}(id=${aluno.id})}" class="btn btn-danger btn-sm">Excluir</a>
        </td>
    </tr>
</table>

</body>
</html>
