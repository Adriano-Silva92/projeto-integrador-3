<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Negado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .error-card {
            background: white;
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 90%;
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .lock-icon {
            font-size: 80px;
            color: #dc3545;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 2rem;
            color: #333;
            margin-bottom: 20px;
        }
        .message {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        .btn-voltar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-voltar:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            color: white;
        }
        .info-text {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="lock-icon">🔒</div>
        <h1>Acesso Negado</h1>
        <div class="message">
            Você não tem permissão para acessar esta página.
        </div>
        <button class="btn-voltar" onclick="voltarParaDashboard()">
            ← Clique aqui para voltar
        </button>
        <div class="info-text">
            Se você acredita que isso é um erro, entre em contato com o administrador.
        </div>
    </div>

    <script>
        function voltarParaDashboard() {
            // Pega o role do usuário da sessão 
            const userRole = /*[[${session.usuarioLogado != null ? session.usuarioLogado.role : null}]]*/ null;
            
            // Redireciona baseado no role
            if (userRole === 'ADMIN') {
                window.location.href = '/admin';
            } else if (userRole === 'PROFESSOR') {
                window.location.href = '/turmas';
            } else if (userRole === 'ALUNO') {
                window.location.href = '/aluno/dashboard';
            } else {
                // Se não tiver usuário logado, vai para login
                window.location.href = '/login';
            }
        }
    </script>
</body>
</html>
